{% extends "core/base_auth.html" %}
{% load static %}

{% block title %}會員註冊{% endblock title %}

{% block content %}
<div class="auth-form-container">

  <h3 class="mb-4 text-center">註冊會員</h3>
  <form method="POST" novalidate>
    {% csrf_token %}

    <div class="mb-3">
      <label for="username" class="form-label">帳號</label>   
      <input type="text" id="username" name="username" class="form-control" placholder="請輸入帳號" reqiured>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">密碼</label>
      <input type="password" id="password" name="password" class="form-control" placholder="請輸入密碼" reqiured>
    </div>

    <div class="mb-3">
      <label for="password2" class=form-label>確認密碼</label>
      <input type="password" id="password2" name="password2" class="form-control" placholder="再次輸入密碼" reqiured>
    </div>

    <div class="mb-3">
      <label for="phonenumber" class="form-label">手機號碼</label>
      <input type="text" id="phonenumber" name="phonenumber" class="form-control" placholder="09xxxxxxxx" reqiured>
    </div>
        
    <button type="submit" class="btn btn-primary w-100 py-2">註冊</button>

    <!-- 已有帳號 -->
    <p class="register-login-text mt-3">已有帳號了?
      <a href="{% url 'login' %}">登入</a>
    </p>
  </form>
</div>

{% endblock content %}
