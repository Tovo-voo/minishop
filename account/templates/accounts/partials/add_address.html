<div id="addAddressModal" class="modal" style="display:none;">
  <div class="modal-content">

    <div class="modal-header">
      <h3>新增收貨地址</h3>
      <button type="button" class="close-btn" onclick="closeAddAddress()">×</button>
    </div>

    <!-- ✅ 小提示/錯誤訊息區 -->
    <div id="addAddressMsg" style="margin: 8px 0; font-size: 14px;"></div>

    <form id="addAddressForm" novalidate>
      {% csrf_token %}

      <div class="form-group">
        <label>收件人</label>
        <input type="text" name="receiver" required>
      </div>

      <div class="form-group">
        <label>手機</label>
        <input type="text" name="phone" required>
      </div>

      <div class="form-group">
        <label>地址</label>
        <input type="text" name="address" required>
      </div>

      <button id="addAddressSubmitBtn" type="submit" class="btn-primary">
        儲存收貨地址
      </button>
    </form>

  </div>
</div>
