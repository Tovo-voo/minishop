{% extends "core/base_auth.html" %}
{% load static %}

{% block title %}會員登入{% endblock title %}

{% block content %}


<div class="auth-form-container">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }}" role="alert">
      {{ message }}
    </div>
  {% endfor %}
  <h4 class="mb-4 text-center">會員登入</h4>
  <form method="POST" id="login-form" novalidate>
    {% csrf_token %}

    <div class="mb-3">
      <label for="username" class="form-label">帳號</label>   
      <input type="text" id="username" name="username" class="form-control" placeholder="請輸入帳號" required>
      <div id="username-error" class="field-error">帳號不能為空</div>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">密碼</label>
      <input type="password" id="password" name="password" class="form-control" placeholder="請輸入密碼" required>
      <div id="password-error" class="field-error">密碼不能為空</div>
    </div>

    <button type="submit" class="btn-login w-100 py-2">登入</button>

    <p class="register-login-text mt-3">還沒有帳號?
      <a href="{% url 'register' %}">註冊</a>
    </p>
  </form>
</div>

{% endblock content %}
